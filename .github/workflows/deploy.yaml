name: Build and Deploy

on:
    push:
        branches:
            - main
        tags:
            - 'v[0-9]+\.[0-9]+\.[0-9]+'
    workflow_dispatch:

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install uv
                  uv sync --no-dev
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to Production Server
              uses: appleboy/ssh-action@v1.0.3
              env:
                  ENV_FILE_CONTENT: ${{ secrets.PROD_ENV_FILE }}
              with:
                  host: ${{ secrets.SERVER_SSH_HOST }}
                  username: ${{ secrets.SERVER_SSH_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  port: ${{ secrets.SERVER_SSH_PORT }}
                  envs: ENV_FILE_CONTENT
                  command_timeout: 30m
                  script: |
                      set -e

                      DEPLOY_DIR="/var/www/Backend"

                      echo "=== Production Deployment ==="

                      # Pull latest code
                      cd "$DEPLOY_DIR"
                      GIT_SSH_COMMAND="ssh -i /root/.ssh/id_deploy -o StrictHostKeyChecking=no" git fetch origin main
                      git reset --hard origin/main

                      # Create .env file from secret
                      mkdir -p "$DEPLOY_DIR/src/config/env"
                      printenv ENV_FILE_CONTENT > "$DEPLOY_DIR/src/config/env/.env"

                      cd "$DEPLOY_DIR/Docker"

                      # Stop existing containers
                      docker compose down --timeout 30 || true

                      # Build and deploy with cache
                      docker compose build --pull
                      docker compose up -d --remove-orphans

                      sleep 10
                      docker compose ps

                      # Verify deployment
                      if ! docker compose ps | grep -q "Up"; then
                        echo "ERROR: Some services failed!"
                        docker compose logs --tail=50
                        exit 1
                      fi

                      # Cleanup old images
                      docker image prune -f --filter "until=168h" || true

                      echo "=== Production deployment completed! ==="
